# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Allow data.sql to run after JPA creates the schema
spring.jpa.defer-datasource-initialization=true

# Enable H2 browser console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Exception handling
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# JWT
jwt.secret=MySuperSecretKeyForJWTThatIsAtLeast32Bytes!
jwt.access-expiration-ms=60000
jwt.refresh-expiration-ms=120000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=<your@mailservice>
spring.mail.password=<your-app-password>
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
